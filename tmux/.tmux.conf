# Change control binding to C-s
unbind C-b
set -g prefix C-s
set -g history-limit 100000

# Reload feature 
unbind r
bind r source-file ~/.tmux.conf

# LDUR
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Open new windows/splits in the current pane's directory instead of the
# session's start dir (tmux default), so new shells inherit where you are.
bind-key c new-window -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"

# Dump the current pane (full scrollback) to ~/tmp/tmux.output.
# #{pane_id} -> tmux fills in the active pane; ~ -> shell expands per-host $HOME.
# -J joins wrapped lines; -S - starts from the top of the scrollback.
bind-key C-o run-shell 'mkdir -p ~/tmp && tmux capture-pane -pJS - -t "#{pane_id}" > ~/tmp/tmux.output && tmux display-message "pane saved to ~/tmp/tmux.output"'

bind-key a command-prompt -p "Guas Domain?" "run-shell 'bash ~/bin/debug.sh %%'"
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
# Prompt for a GUAS session string and launch the 2-pane helper window.
bind-key u command-prompt -p "Guas session?" "run-shell 'bash ~/bin/launch_session.sh %%'"
unbind d
bind-key d command-prompt -p "Username?" "run-shell 'bash ~/bin/user.sh %%'"
# Enable mouse mode
set -g mouse on
set -g set-clipboard on
set -g aggressive-resize on

# Increase the buffer of every pane
set -g history-limit 100000

# Hold shift to copy things

# Start counting pane and window number at 1
set -g base-index 1
set -g pane-base-index 1

# Keep manually-set window names; don't let tmux or programs rename windows
set -g automatic-rename off
set -g allow-rename off

set -g default-shell /bin/zsh
set -g default-terminal screen-256color

set -g mode-keys vi

set -g @fzf-launch 'C-f'

# List of plugins
# Plugin manager for Tmux
set -g @plugin 'tmux-plugins/tpm' 
# Plugin to extract small texts from the panes like git commit hashs, etc.
set -g @plugin 'laktak/extrakto'
# Plugin to search through the panes using fzf.
set -g @plugin 'sainnhe/tmux-fzf'
# Plugin for catppuccin theme for tmux.
set -g @plugin 'catppuccin/tmux'

set-option -g status-position bottom
# --- catppuccin v2.x: window tab styling ---
# Tab separator preset: basic | rounded | slanted | custom | none.
# options; "slanted" reproduces the old powerline-slant look.
set -g @catppuccin_window_status_style "slanted"
# Inactive tab label
# "#W" = window name, so manual names persist (default " #T" = pane title).
set -g @catppuccin_window_text " #W"
# Active tab label; "#W" = window name (default " #T" = pane title).
set -g @catppuccin_window_current_text " #W"

# --- catppuccin v2.x: status line ---
# Separator glyph on the left edge of each status module.
set -g @catppuccin_status_left_separator  " "
# Separator glyph on the right edge of each status module.
set -g @catppuccin_status_right_separator ""
# Do not draw a connecting separator between modules (default: yes).
set -g @catppuccin_status_connect_separator "no"

# Directory module label: full path (default is basename #{b:pane_current_path}).
set -g @catppuccin_directory_text "#{pane_current_path}"
# Clock module text: date, 24h time, and timezone abbreviation
# (%Z -> e.g. EDT/IST; use %z for a numeric offset like +0530).
set -g @catppuccin_date_time_text " %Y-%m-%d %H:%M %Z"

# Max width of the right status; default 40 truncates long dir + clock.
set -g status-right-length 120
# Compose the right side of the status bar (order = left to right):
# directory, then session, then date/time.
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# Plugin list
bind P command-prompt -p "plugin:" "run-shell '~/.tmux/plugins/tpm/bin/list_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
