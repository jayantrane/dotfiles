# Change control binding to C-s
unbind C-b
set -g prefix C-s
set -g history-limit 100000

# Reload feature 
unbind r
bind r source-file ~/.tmux.conf

# LDUR
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key a command-prompt -p "Guas Domain?" "run-shell 'bash ~/bin/debug.sh %%'"
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
# Prompt for a GUAS session string and launch the 2-pane helper window.
bind-key u command-prompt -p "Guas session?" "run-shell 'bash ~/bin/launch_session.sh %%'"
unbind d
bind-key d command-prompt -p "Username?" "run-shell 'bash ~/bin/user.sh %%'"
# Enable mouse mode
set -g mouse on
set -g set-clipboard on
set -g aggressive-resize on

# Increase the buffer of every pane
set -g history-limit 100000

# Hold shift to copy things

# Start counting pane and window number at 1
set -g base-index 1
set -g pane-base-index 1

set -g default-shell /bin/zsh
set -g default-terminal screen-256color

set -g mode-keys vi

set -g @fzf-launch 'C-f'

# List of plugins
# Plugin manager for Tmux
set -g @plugin 'tmux-plugins/tpm' 
# Plugin to extract small texts from the panes like git commit hashs, etc.
set -g @plugin 'laktak/extrakto'
# Plugin to search through the panes using fzf.
set -g @plugin 'sainnhe/tmux-fzf'
# Plugin for catppuccin theme for tmux.
set -g @plugin 'catppuccin/tmux'

set-option -g status-position bottom
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @catppuccin_status_modules_right "directory session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_directory_text "#{pane_current_path}"

# Plugin list
bind P command-prompt -p "plugin:" "run-shell '~/.tmux/plugins/tpm/bin/list_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
